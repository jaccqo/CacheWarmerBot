name: Async Cache Warmer

on:
  schedule:
    - cron: '0 2 * * *'  # every day at 2:00 AM UTC
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install aiohttp
      - run: python cache_warmer.py